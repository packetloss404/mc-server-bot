# DyoBot Sidecar Configuration

api:
  port: 3001
  host: "0.0.0.0"

minecraft:
  host: "play.dyoburon.com"
  port: 25565
  version: "1.21.11"
  auth: "offline"

bots:
  maxBots: 10
  defaultMode: "codegen"
  # Gentle on the server's connection rate-limiter: a wide join stagger + long
  # reconnect delay keeps 8 bots from hammering logins (which trips the server
  # into refusing logins fleet-wide). Raised after a churn-induced login
  # rate-limit on 2026-05-25.
  joinStaggerMs: 45000
  reconnectDelaySec: 60
  maxReconnectAttempts: 30

behavior:
  headTrackingRange: 10
  headTrackingTickMs: 250
  wanderRadius: 15
  wanderIntervalMs: 5000
  ambientChatMinSec: 120
  ambientChatMaxSec: 300
  conversationRadius: 64.0

affinity:
  default: 50
  hitPenalty: 10
  chatBonus: 2
  giftBonus: 5
  negativeSentimentPenalty: 3
  hostileThreshold: 20
  trustThreshold: 70

instincts:
  enabled: true
  attackCooldownMs: 12000
  lowHealthThreshold: 8
  fleeDistance: 14
  fightRange: 3
  drowningOxygenThreshold: 120
  drowningSurfaceClearOxygen: 260

voyager:
  enabled: true
  taskCooldownMs: 2000
  maxRetriesPerTask: 3
  codeExecutionTimeoutMs: 300000
  curriculumLLMCalls: true
  criticLLMCalls: true

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.7
  chatMaxTokens: 2048
  codeGenMaxTokens: 8192
  maxConcurrentRequests: 3

skills:
  directory: "./skills"
  maxSkills: 500

logging:
  level: "debug"

# Followup #58 — player-identity session.
#   devSecret: when set, POST /api/auth/login requires this string as
#     the `secret` body field and accepts it for ANY playerName. The
#     login mints a signed `pid` cookie that requireMayor validates
#     against the town's mayor.playerName.
#   Leave commented out (or set to null) for local-dev mode where any
#     playerName logs in successfully. Per-player secrets are a future
#     followup; today this is a single shared key.
auth:
  devSecret: null

# Impersonation detection — defends against another client logging in under a
# bot's username (which kicks the real bot via duplicate-login). On detection
# the bot quarantines itself (stops reconnecting) and an alert is raised on the
# dashboard, the log, and — if configured — in-game chat and a webhook.
#   impersonationDetection: master switch (default ON).
#   broadcastInGame: have a connected bot warn in Minecraft chat (visible to
#     the attacker by design).
#   quarantineReleaseSec: reserved; 0 = manual release only
#     (POST /api/bots/:name/quarantine/release).
# Webhook URL is set via the IMPERSONATION_ALERT_WEBHOOK env var, not here.
security:
  impersonationDetection: true
  broadcastInGame: true
  quarantineReleaseSec: 0

# Project Sid P2 — "Governance that bites". When enabled, a mayor decree is
# ALSO persisted as a standing TownRule (data/town_rules.json) and
# BlackboardManager boosts tasks whose text/keywords match an active rule for
# the bot's town, so decrees keep shaping behavior instead of being one-shot.
#   enabled: master switch (default OFF — behavior-changing). When false,
#     decrees keep their legacy one-shot-task behavior and task scores are
#     identical to today (the rule store is never consulted).
governance:
  enabled: true

# Project Sid P3 — "Culture & social spread".
#   botAffinity: master switch for bot->bot affinity edges (P3-A). When ON,
#     bots derive a CHEAP, non-LLM sentiment from each inter-bot message they
#     process (message kind + keyword scan) and nudge a directed bot->peer
#     affinity edge via the existing affinity store. Top bot-relationships are
#     surfaced in the chat prompt, and a disliked peer (below the affinity
#     hostile threshold) is deprioritized for help/resource sharing. Default
#     OFF — when false, inter-bot messages behave exactly as before with no
#     affinity edges and no added LLM cost.
#   culture: master switch for the P3-B cultural-meme layer (CultureManager).
#     When ON, memes EMERGE from recurring inter-bot chatter (cheap keyword
#     frequency, no LLM), a bot ADOPTS a meme it hears from a TRUSTED peer
#     (bot->bot affinity at/above affinity.trustThreshold), and adopted memes
#     BIAS BEHAVIOR — they flavor ambient chat AND are injected into the bot's
#     task/goal prompt (so culture changes what bots do, not just what they
#     say). Memes propagate via BotComms.broadcast(). See GET /api/culture for
#     per-town meme curves. Default OFF — when false the worker never wires the
#     culture proxy, so there is zero behavior change and zero added LLM cost.
social:
  botAffinity: true
  culture: true

# Project Sid P4 — "PIANO cognition".
#   perceptionTick: master switch for the always-on perception tick (P4-A).
#     When ON, the threat/opportunity/survival-goal assessors run on their own
#     short-interval timer (~750ms, like the instinct loop) and write results
#     into a per-bot AgentState cache; VoyagerLoop.runOneCycle READS that cache
#     instead of computing inline, so a threat that spawns mid-task is perceived
#     before the next cycle's inline scan would have caught it. Default OFF —
#     when false the perception timer is never started and runOneCycle computes
#     the assessment inline byte-for-byte as today (cache never consulted, zero
#     added timer/CPU cost).
#   cognitiveController: reserved for the P4-B CognitiveController + decision
#     broadcast (replaces the imperative priority ladder). Default OFF.
cognition:
  perceptionTick: true
  cognitiveController: true

# Mining geofence — keeps bots from tunnelling through town structures to gather
# raw materials, and routes resource mining to a single communal mine site.
# Consumed by src/actions/geofence.ts (read once per worker; fail-open if absent
# or unreadable, so mining never breaks just because this section is missing).
mining:
  # Axis-aligned protected boxes around known builds. mineBlock refuses to dig
  # any block inside these zones, so bots can't chew into roads / houses / the
  # town hall. Coordinates are generous bounding boxes around each build cluster.
  protectedZones:
    - name: "victorian-cluster"      # victorian palace + Sam's plaque + town hall + sam-cottage(1640)
      minX: 1590
      minY: 40
      minZ: 150
      maxX: 1670
      maxY: 130
      maxZ: 230
    - name: "townhall-cluster-1200"  # birch houses / earlier town-hall attempts
      minX: 1160
      minY: 40
      minZ: 460
      maxX: 1240
      maxY: 130
      maxZ: 540
    - name: "sam-cottage-829"
      minX: 800
      minY: 40
      minZ: 215
      maxX: 860
      maxY: 120
      maxZ: 270
    - name: "north-outliers"         # birch house outliers around 958/-179
      minX: 930
      minY: 40
      minZ: -210
      maxX: 990
      maxY: 130
      maxZ: -150
  # Communal mine site: bots walk here before mining any routed block type, then
  # dig down/out AT the site instead of wherever they happen to be standing.
  # Placed just east of the victorian cluster, outside its protected box.
  mineSite:
    x: 1720
    y: 64
    z: 194
    radius: 24
  # Raw block types that must be sourced at the communal mine, not in town.
  routeToMineBlocks:
    - stone
    - cobblestone
    - deepslate
    - cobbled_deepslate
    - andesite
    - diorite
    - granite
    - tuff
    - dirt
    - gravel
    - coal_ore
    - iron_ore
    - copper_ore
    - gold_ore
    - redstone_ore
    - lapis_ore
    - diamond_ore
    - emerald_ore
    - deepslate_coal_ore
    - deepslate_iron_ore
    - deepslate_copper_ore
    - deepslate_gold_ore
    - deepslate_redstone_ore
    - deepslate_lapis_ore
    - deepslate_diamond_ore
    - deepslate_emerald_ore
