# DyoBot Sidecar Configuration

api:
  port: 3001
  host: "127.0.0.1"

minecraft:
  host: "play.dyoburon.com"
  port: 25565
  version: "1.21.11"
  auth: "offline"

bots:
  maxBots: 10
  defaultMode: "codegen"
  joinStaggerMs: 5000
  reconnectDelaySec: 5
  maxReconnectAttempts: 10

behavior:
  headTrackingRange: 10
  headTrackingTickMs: 250
  wanderRadius: 15
  wanderIntervalMs: 5000
  ambientChatMinSec: 120
  ambientChatMaxSec: 300
  conversationRadius: 64.0

affinity:
  default: 50
  hitPenalty: 10
  chatBonus: 2
  giftBonus: 5
  negativeSentimentPenalty: 3
  hostileThreshold: 20
  trustThreshold: 70

instincts:
  enabled: true
  attackCooldownMs: 12000
  lowHealthThreshold: 8
  fleeDistance: 14
  fightRange: 3
  drowningOxygenThreshold: 120
  drowningSurfaceClearOxygen: 260

voyager:
  enabled: true
  taskCooldownMs: 2000
  maxRetriesPerTask: 3
  codeExecutionTimeoutMs: 300000
  curriculumLLMCalls: true
  criticLLMCalls: true

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.7
  chatMaxTokens: 2048
  codeGenMaxTokens: 8192
  maxConcurrentRequests: 3

skills:
  directory: "./skills"
  maxSkills: 500

logging:
  level: "debug"
