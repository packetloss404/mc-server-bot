# DyoBot Sidecar Configuration

api:
  port: 3001
  host: "0.0.0.0"

minecraft:
  host: "play.dyoburon.com"
  port: 25565
  version: "1.21.11"
  auth: "offline"

bots:
  maxBots: 10
  defaultMode: "codegen"
  joinStaggerMs: 15000
  reconnectDelaySec: 30
  maxReconnectAttempts: 10

behavior:
  headTrackingRange: 10
  headTrackingTickMs: 250
  wanderRadius: 15
  wanderIntervalMs: 5000
  ambientChatMinSec: 120
  ambientChatMaxSec: 300
  conversationRadius: 64.0

affinity:
  default: 50
  hitPenalty: 10
  chatBonus: 2
  giftBonus: 5
  negativeSentimentPenalty: 3
  hostileThreshold: 20
  trustThreshold: 70

instincts:
  enabled: true
  attackCooldownMs: 12000
  lowHealthThreshold: 8
  fleeDistance: 14
  fightRange: 3
  drowningOxygenThreshold: 120
  drowningSurfaceClearOxygen: 260

voyager:
  enabled: true
  taskCooldownMs: 2000
  maxRetriesPerTask: 3
  codeExecutionTimeoutMs: 300000
  curriculumLLMCalls: true
  criticLLMCalls: true

llm:
  provider: "gemini"
  model: "gemini-2.5-flash"
  temperature: 0.7
  chatMaxTokens: 2048
  codeGenMaxTokens: 8192
  maxConcurrentRequests: 3

skills:
  directory: "./skills"
  maxSkills: 500

logging:
  level: "debug"

# Followup #58 — player-identity session.
#   devSecret: when set, POST /api/auth/login requires this string as
#     the `secret` body field and accepts it for ANY playerName. The
#     login mints a signed `pid` cookie that requireMayor validates
#     against the town's mayor.playerName.
#   Leave commented out (or set to null) for local-dev mode where any
#     playerName logs in successfully. Per-player secrets are a future
#     followup; today this is a single shared key.
auth:
  devSecret: null

# Impersonation detection — defends against another client logging in under a
# bot's username (which kicks the real bot via duplicate-login). On detection
# the bot quarantines itself (stops reconnecting) and an alert is raised on the
# dashboard, the log, and — if configured — in-game chat and a webhook.
#   impersonationDetection: master switch (default ON).
#   broadcastInGame: have a connected bot warn in Minecraft chat (visible to
#     the attacker by design).
#   quarantineReleaseSec: reserved; 0 = manual release only
#     (POST /api/bots/:name/quarantine/release).
# Webhook URL is set via the IMPERSONATION_ALERT_WEBHOOK env var, not here.
security:
  impersonationDetection: true
  broadcastInGame: true
  quarantineReleaseSec: 0

# Project Sid P2 — "Governance that bites". When enabled, a mayor decree is
# ALSO persisted as a standing TownRule (data/town_rules.json) and
# BlackboardManager boosts tasks whose text/keywords match an active rule for
# the bot's town, so decrees keep shaping behavior instead of being one-shot.
#   enabled: master switch (default OFF — behavior-changing). When false,
#     decrees keep their legacy one-shot-task behavior and task scores are
#     identical to today (the rule store is never consulted).
governance:
  enabled: false

# Project Sid P3 — "Culture & social spread".
#   botAffinity: master switch for bot->bot affinity edges (P3-A). When ON,
#     bots derive a CHEAP, non-LLM sentiment from each inter-bot message they
#     process (message kind + keyword scan) and nudge a directed bot->peer
#     affinity edge via the existing affinity store. Top bot-relationships are
#     surfaced in the chat prompt, and a disliked peer (below the affinity
#     hostile threshold) is deprioritized for help/resource sharing. Default
#     OFF — when false, inter-bot messages behave exactly as before with no
#     affinity edges and no added LLM cost.
#   culture: master switch for the P3-B cultural-meme layer (CultureManager).
#     When ON, memes EMERGE from recurring inter-bot chatter (cheap keyword
#     frequency, no LLM), a bot ADOPTS a meme it hears from a TRUSTED peer
#     (bot->bot affinity at/above affinity.trustThreshold), and adopted memes
#     BIAS BEHAVIOR — they flavor ambient chat AND are injected into the bot's
#     task/goal prompt (so culture changes what bots do, not just what they
#     say). Memes propagate via BotComms.broadcast(). See GET /api/culture for
#     per-town meme curves. Default OFF — when false the worker never wires the
#     culture proxy, so there is zero behavior change and zero added LLM cost.
social:
  botAffinity: false
  culture: false
